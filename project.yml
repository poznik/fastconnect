name: FastConnect
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 13.0
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: NO
targets:
  FastConnect:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: FastConnect/Sources
      - path: FastConnect/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: FastConnect
        PRODUCT_BUNDLE_IDENTIFIER: com.fastconnect.app
        INFOPLIST_FILE: FastConnect/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ICON_FILE: Disconnected
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 1.1
        CODE_SIGN_STYLE: Automatic
